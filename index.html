<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tamagotchi-Baum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Mein Baum</h1>
    <div class="status">
      <div id="healthBadge" class="badge">Status: –</div>
      <div id="streak" class="meta">Gieß-Tage: 0</div>
      <div id="lastWatered" class="meta">Zuletzt gegossen: –</div>
      <div id="daysSince" class="meta">Verpasste Intervalle: –</div>
    </div>

    <div id="treeArea">
      <div id="tree" title="Klicke, um zu gießen"></div>
      <div id="ground"></div>
    </div>

    <div class="controls">
      <button id="waterBtn">Baum gießen</button>
      <button id="resetBtn" class="ghost">Neustart</button>
    </div>

    <section class="controls interval">
      <label for="intervalMinutes">
        „Tages“-Länge: <strong><span id="intervalLabel">1440</span> Minuten</strong>
      </label>
      <input id="intervalMinutes" type="range" min="1" max="1440" step="1" value="1440" />
      <p class="hint">
        Stelle ein, wie viele Minuten ein „Tag“ dauert. Nach 3 verpassten „Tagen“ stirbt der Baum.
      </p>
    </section>

    <p class="hint">
      Standard: 1440 Minuten (= 24h). Für Tests gern auf 1 Minute stellen.
    </p>
  </main>

  <footer>
    <small>Speicherung lokal im Browser (localStorage).</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
